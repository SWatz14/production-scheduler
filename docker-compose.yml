version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: scheduler_db
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: scheduler_user
      POSTGRES_PASSWORD: scheduler_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: scheduler_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: scheduler_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scheduler
      SPRING_DATASOURCE_USERNAME: scheduler_user
      SPRING_DATASOURCE_PASSWORD: scheduler_pass
      SPRING_REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  scheduler:
    build: ./scheduler
    container_name: scheduler_engine
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: scheduler_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: