spring.application.name=production-scheduler
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scheduler}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:scheduler_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:scheduler_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${SERVER_PORT:8080}